name: Build and Push google-workspace-mcp

# Triggers (deliberately NO `schedule:` — see crunchtools/constitution validate-cascade):
#   push                — Containerfile / workflow changes
#   pull_request        — Trivy scan + SBOM only, no push
#   repository_dispatch parent-image-updated — fired when an upstream image we
#     FROM rebuilds (handled by Hermes / the cascade).
#   workflow_dispatch   — manual rebuild on demand
#
# Profile alignment (crunchtools container image profile): Buildah build, Trivy
# vulnerability scan blocking on HIGH/CRITICAL, SBOM generation, dual registry
# push (Quay + GHCR). Cosign signing deferred to a later hardening pass.

on:
  push:
    branches: [main]
    paths:
      - 'Containerfile'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [main]
  repository_dispatch:
    types: [parent-image-updated]
  workflow_dispatch:

env:
  QUAY_IMAGE: quay.io/crunchtools/google-workspace-mcp
  GHCR_IMAGE: ghcr.io/crunchtools/google-workspace-mcp

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version tag
        id: version
        run: |
          TAG=$(git describe --tags --always 2>/dev/null || echo "v0.1.0")
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build image with Buildah
        id: build
        uses: redhat-actions/buildah-build@v2
        with:
          image: google-workspace-mcp
          tags: latest ${{ steps.version.outputs.tag }} ${{ steps.version.outputs.sha_short }}
          containerfiles: ./Containerfile

      - name: Save image for Trivy scan and SBOM
        run: podman save -o /tmp/gwsmcp.tar localhost/google-workspace-mcp:latest

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          input: /tmp/gwsmcp.tar
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"

      - name: Generate SBOM (Trivy / SPDX-JSON)
        uses: aquasecurity/trivy-action@master
        with:
          input: /tmp/gwsmcp.tar
          format: "spdx-json"
          output: "google-workspace-mcp-sbom.spdx.json"
          exit-code: "0"

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: google-workspace-mcp-sbom-${{ steps.version.outputs.sha_short }}
          path: google-workspace-mcp-sbom.spdx.json
          retention-days: 90

      - name: Log in to Quay.io
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Push to Quay.io
        if: github.event_name != 'pull_request'
        run: |
          podman tag localhost/google-workspace-mcp:latest ${{ env.QUAY_IMAGE }}:latest
          podman tag localhost/google-workspace-mcp:latest ${{ env.QUAY_IMAGE }}:${{ steps.version.outputs.tag }}
          podman push ${{ env.QUAY_IMAGE }}:latest
          podman push ${{ env.QUAY_IMAGE }}:${{ steps.version.outputs.tag }}

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Push to GHCR
        if: github.event_name != 'pull_request'
        run: |
          podman tag localhost/google-workspace-mcp:latest ${{ env.GHCR_IMAGE }}:latest
          podman tag localhost/google-workspace-mcp:latest ${{ env.GHCR_IMAGE }}:${{ steps.version.outputs.tag }}
          podman push ${{ env.GHCR_IMAGE }}:latest
          podman push ${{ env.GHCR_IMAGE }}:${{ steps.version.outputs.tag }}
